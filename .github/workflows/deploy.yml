name: Deploy Astro Site

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-course-content]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hub (Astro)
        uses: actions/checkout@v4

      - name: Checkout 161324 course content
        uses: actions/checkout@v4
        with:
          repository: nknowlton/161324
          path: _courses/161324

      - name: Debug 161324 payload summary
        run: |
          echo "### 161324 payload debug" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -d "_courses/161324" ]; then
            echo "- _courses/161324 checkout: missing" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "- _courses/161324 checkout: present" >> "$GITHUB_STEP_SUMMARY"
          for d in docs lectures-html labs data; do
            p="_courses/161324/$d"
            if [ -d "$p" ]; then
              count=$(find "$p" -maxdepth 1 -type f | wc -l)
              echo "- $d: present ($count top-level files)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- $d: missing" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [ -f "_courses/161324/docs/index.html" ]; then
            echo "- docs/index.html: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- docs/index.html: MISSING (notes landing page may 404)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "_courses/161324/lectures-html/index.html" ]; then
            echo "- lectures-html/index.html: present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- lectures-html/index.html: MISSING (lectures landing page may 404)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Stage 161324 content in public/
        run: |
          rm -rf public/161324/notes public/161324/lectures public/161324/data public/161324/labs

          if [ -d "_courses/161324/docs" ]; then
            mkdir -p public/161324/notes
            cp -r _courses/161324/docs/. public/161324/notes/
            echo "- notes staged in public/161324/notes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- WARNING: notes not staged (_courses/161324/docs missing)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -d "_courses/161324/lectures-html" ]; then
            mkdir -p public/161324/lectures
            shopt -s nullglob
            lecture_files=(_courses/161324/lectures-html/*)
            if [ ${#lecture_files[@]} -gt 0 ]; then
              cp -r _courses/161324/lectures-html/. public/161324/lectures/
              echo "- lectures staged in public/161324/lectures" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- WARNING: lectures not staged (_courses/161324/lectures-html empty)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- WARNING: lectures not staged (_courses/161324/lectures-html missing)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -d "_courses/161324/data" ]; then
            mkdir -p public/161324/data
            shopt -s nullglob
            csv_files=(_courses/161324/data/*.csv)
            gz_files=(_courses/161324/data/*.csv.gz)

            if [ ${#csv_files[@]} -gt 0 ]; then
              for f in "${csv_files[@]}"; do
                out="public/161324/data/$(basename "$f").gz"
                gzip -c "$f" > "$out"
              done
              echo "- csv.gz data staged in public/161324/data (${#csv_files[@]} generated)" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ ${#gz_files[@]} -gt 0 ]; then
              cp _courses/161324/data/*.csv.gz public/161324/data/
              echo "- existing csv.gz files staged in public/161324/data (${#gz_files[@]} copied)" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ ${#csv_files[@]} -eq 0 ] && [ ${#gz_files[@]} -eq 0 ]; then
              echo "- WARNING: data not staged (no CSV or CSV.GZ files)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- WARNING: data not staged (_courses/161324/data missing)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -d "_courses/161324/labs" ]; then
            mkdir -p public/161324/labs
            shopt -s nullglob
            lab_files=(_courses/161324/labs/*)
            if [ ${#lab_files[@]} -gt 0 ]; then
              cp -r _courses/161324/labs/. public/161324/labs/
              echo "- labs staged in public/161324/labs" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- WARNING: labs not staged (_courses/161324/labs empty)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- WARNING: labs not staged (_courses/161324/labs missing)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
